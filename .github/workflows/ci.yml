name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check formatting and lint rules
        run: vp run check

      - name: Run tests
        run: vp run test

      - name: Build
        run: vp run build

  deploy-production:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
      VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
      VITE_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_POSTHOG_PROJECT_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build production bundle
        run: vp run build:production

      - name: Apply production migrations
        run: vp run db:migrate

      - name: Deploy production Worker
        run: vp run deploy:worker
